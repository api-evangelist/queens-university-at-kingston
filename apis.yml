apis:
  - aid: queens-university-at-kingston:qmulus
    name: Qmulus Open Data API
    description: >-
      Qmulus is a community-run open-data REST API providing access to Queen's
      University datasets (such as courses, buildings, and textbooks). Access
      requires an API token; token registration is currently restricted to
      holders of an @queensu.ca email address. The api.qmulus.io host did not
      resolve at the time of review, though the docs and landing site are live.
    humanURL: https://qmulus.io/
    baseURL: https://api.qmulus.io/v1
    tags: [ Open Data, Courses, REST, Education ]
    properties:
      - type: Documentation
        url: https://docs.qmulus.io
      - type: SignUp
        url: https://manage.qmulus.io/token
      - type: GitHub
        url: https://github.com/queens-qmulus/qmulus
  - aid: queens-university-at-kingston:qspace
    name: QSpace Repository API (DSpace)
    description: >-
      QSpace is Queen's University Library's open-access institutional
      repository built on DSpace, hosting theses, dissertations, and
      peer-reviewed scholarship. It exposes a DSpace REST API and an OAI-PMH
      metadata harvesting interface for programmatic access to records.
    humanURL: https://qspace.library.queensu.ca/
    baseURL: https://qspace.library.queensu.ca/server/api
    tags: [ Repository, DSpace, OAI-PMH, Research, Library ]
    properties:
      - type: Documentation
        url: https://qspace.library.queensu.ca/
      - type: OAI-PMH
        url: https://qspace.library.queensu.ca/server/oai/request?verb=Identify
  - aid: queens-university-at-kingston:dataverse
    name: Queen's University Dataverse (Borealis)
    description: >-
      The Queen's University Dataverse is the institution's open-access research
      data repository, hosted on Borealis, the Canadian Dataverse Repository. It
      supports the Dataverse native REST API, OAI-PMH metadata harvesting, and
      SWORD for programmatic deposit and access.
    humanURL: https://borealisdata.ca/dataverse/queens
    baseURL: https://borealisdata.ca/api
    tags: [ Research Data, Dataverse, OAI-PMH, REST, Repository ]
    properties:
      - type: Documentation
        url: https://borealisdata.ca/guides/en/latest/api/native-api.html
      - type: OAI-PMH
        url: https://borealisdata.ca/oai?verb=Identify
      - type: OpenAPI
        url: openapi/queens-university-at-kingston-dataverse.yaml
