---
aid: queens-university-at-kingston
name: Queen's University at Kingston
description: >-
  Queen's University at Kingston is a public research university in Kingston,
  Ontario, Canada, serving more than 25,000 students and ranked #193 in the QS
  World University Rankings 2025. Its public developer footprint centers on
  Qmulus, a community open-data API exposing Queen's datasets (courses,
  buildings, textbooks and more), alongside library and research-data
  infrastructure: the QSpace institutional repository (DSpace, with REST and
  OAI-PMH interfaces) and the Queen's University Dataverse hosted on the
  Canadian Borealis repository (Dataverse native REST plus OAI-PMH). Most of
  these surfaces are open or community-run rather than a single official
  university developer portal.
