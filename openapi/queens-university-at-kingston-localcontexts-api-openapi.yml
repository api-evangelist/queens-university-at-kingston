openapi: 3.0.3
info:
  title: Dataverse Access Localcontexts API
  description: Open source research data repository software.
  version: v6.8.1-SP
servers:
- url: https://borealisdata.ca/api
  description: Borealis (Canadian Dataverse Repository) hosting the Queen University Dataverse
tags:
- name: Localcontexts
paths:
  /localcontexts/datasets/{id}:
    get:
      operationId: LocalContexts_getDatasetLocalContexts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      tags:
      - Localcontexts
  /localcontexts/datasets/{id}/{projectId}:
    get:
      operationId: LocalContexts_searchLocalContexts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      tags:
      - Localcontexts
