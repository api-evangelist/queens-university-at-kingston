openapi: 3.0.3
info:
  title: Dataverse Access addFileToDataset API
  description: Open source research data repository software.
  version: v6.8.1-SP
servers:
- url: https://borealisdata.ca/api
  description: Borealis (Canadian Dataverse Repository) hosting the Queen University Dataverse
tags:
- name: addFileToDataset
  description: Uploads a file for a dataset
paths:
  /datasets/{id}/add:
    post:
      tags:
      - addFileToDataset
      summary: Uploads a file for a dataset
      description: Uploads a file for a dataset
      operationId: Datasets_addFileToDataset
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
      responses:
        '200':
          description: File uploaded successfully to dataset
