openapi: 3.0.3
info:
  title: Dataverse Access Dataverses API
  description: Open source research data repository software.
  version: v6.8.1-SP
servers:
- url: https://borealisdata.ca/api
  description: Borealis (Canadian Dataverse Repository) hosting the Queen University Dataverse
tags:
- name: Dataverses
paths:
  /dataverses:
    post:
      operationId: Dataverses_addRoot
      responses:
        '200':
          description: OK
      tags:
      - Dataverses
  /dataverses/{dataverseId}/featuredItems:
    put:
      operationId: Dataverses_updateFeaturedItems
      parameters:
      - name: dataverseId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: array
              items:
                format: int64
                type: integer
      responses:
        '200':
          description: OK
      tags:
      - Dataverses
  /dataverses/{identifier}:
    get:
      operationId: Dataverses_getDataverse
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
      - name: returnChildCount
        in: query
        schema:
          type: boolean
      - name: returnOwners
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: OK
      tags:
      - Dataverses
    put:
